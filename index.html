<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>신화창조</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <section id="menuScreen" class="screen active">
      <h1>신화창조</h1>
      <p>신들의 힘으로 적의 신전을 파괴하라</p>
      <button id="goSelectBtn">영웅 선택</button>
    </section>

    <section id="heroSelectScreen" class="screen">
      <h2>영웅을 선택하세요</h2>

      <div id="heroGrid"></div>

      <div id="selectedHeroBox">
        선택된 영웅: <span id="selectedHeroText">없음</span>
      </div>

      <button id="startBattleBtn" disabled>전투 시작</button>
    </section>

    <section id="gameScreen" class="screen">
      <div id="topUI">
        <div>성역 HP <span id="playerBaseHp">500</span></div>
        <div id="currentHeroName">영웅 없음</div>
        <div>적 신전 HP <span id="enemyBaseHp">700</span></div>
      </div>

      <div id="battlefield">
        <div id="backgroundText">MYTH GENESIS</div>
        <div id="playerBase" class="base">성역</div>
        <div id="enemyBase" class="base">적 신전</div>
        <div id="player"></div>
      </div>

      <div id="bottomUI">
        <div id="manaBox">신력 <span id="manaText">0</span> / 100</div>

        <button id="swordsmanBtn" class="slot" data-unit-id="swordsman">1. 검병<br><small>20 신력</small></button>
        <button id="shieldmanBtn" class="slot" data-unit-id="shieldman">2. 방패병<br><small>35 신력</small></button>
        <button id="archerBtn" class="slot" data-unit-id="archer">3. 궁수<br><small>45 신력</small></button>

        <button id="skill1Btn" class="slot skill">스킬 1<br><small>15 신력</small></button>
        <button id="skill2Btn" class="slot skill">스킬 2<br><small>40 신력</small></button>
        <button id="ultimateBtn" class="slot ultimate">궁극기<br><small>0%</small></button>
      </div>

      <div id="guideText">
        A / D 이동 · 아직 전투 기능은 다음 단계에서 추가
      </div>
    </section>
  </div>

  <script src="./js/ui.js"></script>
  <script src="./js/hero.js"></script>
  <script src="./js/player.js"></script>
  <script src="./js/projectile.js"></script>
  <script src="./js/unit.js"></script>
  <script src="./js/enemy.js"></script>
  <script src="./js/skill.js"></script>
  <script src="./js/stage.js"></script>
  <script src="./js/main.js"></script>
</body>
</html>
